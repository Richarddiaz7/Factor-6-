<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factor 6 - Ruleta Tropical</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(to bottom, #87CEEB 0%, #000080 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; 
            height: 100vh; font-family: sans-serif; color: white;
        }

        #tablero { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .fila-superior { display: flex; gap: 10px; }
        .cuadrado { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 8px; color: black; transition: 0.3s; border: 4px solid transparent; }
        #c6 { width: 150px; height: 60px; background: #FFD700; clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.5em; color: black; transition: 0.3s; border: 4px solid transparent; }

        /* Colores exactos que coinciden con la ruleta */
        .c1 { background-color: #FF5733; } .c2 { background-color: #FFC300; } .c3 { background-color: #DAF7A6; } .c4 { background-color: #33FFBD; } .c5 { background-color: #3380FF; }

        #ruleta-container { position: relative; }
        #flecha { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #FFD700; z-index: 10; }
        
        #ruleta { 
            width: 220px; height: 220px; border-radius: 50%; border: 10px solid white;
            /* Degradado dividido en 6 segmentos de 60 grados cada uno */
            background: conic-gradient(#FF5733 0deg 60deg, #FFC300 60deg 120deg, #DAF7A6 120deg 180deg, #33FFBD 180deg 240deg, #3380FF 240deg 300deg, #FFD700 300deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0, 0, 1);
            position: relative;
        }
        .num { position: absolute; width: 100%; top: 20px; text-align: center; font-weight: bold; color: black; font-size: 1.5em; }

        .btn-lanzar { padding: 15px 40px; font-size: 1.2em; background: #fff; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; color: #000080; }
        .iluminado { border-color: white !important; transform: scale(1.1); box-shadow: 0 0 20px white; }
    </style>
</head>
<body>

    <div id="tablero">
        <div class="fila-superior">
            <div class="cuadrado c1">1</div><div class="cuadrado c2">2</div><div class="cuadrado c3">3</div><div class="cuadrado c4">4</div><div class="cuadrado c5">5</div>
        </div>
        <div id="c6">6</div>
    </div>

    <div id="ruleta-container">
        <div id="flecha"></div>
        <div id="ruleta">
            <div class="num" style="transform: rotate(0deg)">1</div>
            <div class="num" style="transform: rotate(60deg)">2</div>
            <div class="num" style="transform: rotate(120deg)">3</div>
            <div class="num" style="transform: rotate(180deg)">4</div>
            <div class="num" style="transform: rotate(240deg)">5</div>
            <div class="num" style="transform: rotate(300deg)">6</div>
        </div>
    </div>

    <button class="btn-lanzar" id="boton" onclick="girarRuleta()">GIRAR</button>

    <script>
        let grados = 0;
        function girarRuleta() {
            const ruleta = document.getElementById('ruleta');
            const boton = document.getElementById('boton');
            boton.disabled = true;
            
            // Ángulos: Cada número está a 60 grados de diferencia
            const res = Math.floor(Math.random() * 6); // 0 a 5
            const angulos = [0, -60, -120, -180, -240, -300]; 
            
            grados += 1440 + angulos[res]; 
            ruleta.style.transform = `rotate(${grados}deg)`;
            
            setTimeout(() => {
                iluminar(res + 1);
                boton.disabled = false;
            }, 4100);
        }

        function iluminar(n) {
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            if (n === 6) document.getElementById('c6').classList.add('iluminado');
            else document.querySelectorAll('.cuadrado')[n-1].classList.add('iluminado');
        }
    </script>
</body>
</html>
