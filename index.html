<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factor 6 - Edición Tropical</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #FF7E5F, #8A2387, #243B55);
            color: white; font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            height: 100vh; padding: 20px; box-sizing: border-box; overflow: hidden;
        }

        #tablero { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
        .fila-superior { display: flex; gap: 8px; }
        .cuadrado { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; border-radius: 10px; font-size: 1.2em; border: 3px solid rgba(255,255,255,0.3); transition: 0.3s; }
        #c6 { width: 140px; height: 50px; background: #FFD700; clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%); color: black; display: flex; justify-content: center; align-items: center; font-weight: bold; }

        /* Ruleta mejorada */
        #ruleta { 
            width: 240px; height: 240px; border-radius: 50%; border: 10px solid #fff; 
            position: relative; display: flex; justify-content: center; align-items: center;
            background: conic-gradient(#FF5733 0deg 60deg, #FFC300 60deg 120deg, #DAF7A6 120deg 180deg, #33FFBD 180deg 240deg, #3380FF 240deg 300deg, #FFD700 300deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0, 0, 1);
        }
        .num-ruleta { position: absolute; transform-origin: 120px 120px; font-size: 1.5em; font-weight: bold; color: black; }
        
        .btn { 
            padding: 15px 50px; font-size: 1.5em; background: #fff; color: #243B55; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .iluminado { border: 4px solid #fff !important; box-shadow: 0 0 20px #fff; transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="tablero">
        <div class="fila-superior">
            <div class="cuadrado c1">1</div><div class="cuadrado c2">2</div><div class="cuadrado c3">3</div><div class="cuadrado c4">4</div><div class="cuadrado c5">5</div>
        </div>
        <div id="c6">6</div>
    </div>

    <div id="ruleta">
        <div class="num-ruleta" style="transform: rotate(30deg) translate(0, -90px);">1</div>
        <div class="num-ruleta" style="transform: rotate(90deg) translate(0, -90px);">2</div>
        <div class="num-ruleta" style="transform: rotate(150deg) translate(0, -90px);">3</div>
        <div class="num-ruleta" style="transform: rotate(210deg) translate(0, -90px);">4</div>
        <div class="num-ruleta" style="transform: rotate(270deg) translate(0, -90px);">5</div>
        <div class="num-ruleta" style="transform: rotate(330deg) translate(0, -90px);">6</div>
    </div>

    <button class="btn" id="btn" onclick="girar()">¡GIRAR!</button>

    <script>
        let gradosActuales = 0;
        function girar() {
            const btn = document.getElementById('btn');
            const ruleta = document.getElementById('ruleta');
            btn.disabled = true;
            
            // Calculamos grados para que caiga en un número exacto
            const resultados = [330, 270, 210, 150, 90, 30]; // Ángulos para 6, 5, 4, 3, 2, 1
            const res = Math.floor(Math.random() * 6);
            gradosActuales += 1440 + resultados[res]; 
            
            ruleta.style.transform = `rotate(${gradosActuales}deg)`;
            
            setTimeout(() => {
                iluminar(res + 1);
                btn.disabled = false;
            }, 4100);
        }

        function iluminar(n) {
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            if (n === 6) document.getElementById('c6').classList.add('iluminado');
            else document.querySelectorAll('.cuadrado')[n-1].classList.add('iluminado');
        }
    </script>
</body>
</html>
