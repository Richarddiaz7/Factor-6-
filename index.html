<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factor 6 - Edición Tropical</title>
    <style>
        body { 
            margin: 0; 
            /* Fondo Playero Animado */
            background: linear-gradient(135deg, #FF7E5F, #8A2387, #243B55);
            background-size: 400% 400%;
            animation: fondoPlayero 15s ease infinite;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: sans-serif; color: white; overflow: hidden;
        }

        @keyframes fondoPlayero {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #tablero { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .fila-superior { display: flex; gap: 10px; }
        .cuadrado { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 8px; color: black; transition: 0.3s; border: 4px solid transparent; }
        
        #c6 { 
            width: 150px; height: 70px; background: #FFD700; 
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 1.5em; color: black; 
            transition: 0.3s; border: 4px solid transparent; margin-top: 10px; 
        }

        .c1 { background-color: #FF5733; } .c2 { background-color: #FFC300; } .c3 { background-color: #DAF7A6; } .c4 { background-color: #33FFBD; } .c5 { background-color: #3380FF; }

        #dado { font-size: 6em; margin-bottom: 20px; cursor: pointer; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .btn-lanzar { padding: 15px 40px; font-size: 1.2em; background: #fff; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; color: #243B55; transition: 0.3s; }
        .btn-lanzar:hover { transform: scale(1.05); }
        
        /* Efecto neón al iluminar */
        .iluminado { border-color: white !important; transform: scale(1.15); box-shadow: 0 0 30px white, 0 0 10px #FFD700; }
    </style>
</head>
<body>

    <div id="dado">🎲</div>
    <button class="btn-lanzar" id="boton" onclick="iniciarLanzamiento()">¡GIRAR DADO!</button>

    <div id="tablero">
        <div class="fila-superior">
            <div class="cuadrado c1">1</div><div class="cuadrado c2">2</div><div class="cuadrado c3">3</div><div class="cuadrado c4">4</div><div class="cuadrado c5">5</div>
        </div>
        <div id="c6">6</div>
    </div>

    <script>
        const carasDado = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        const boton = document.getElementById('boton');

        function iniciarLanzamiento() {
            boton.disabled = true;
            let contador = 0;
            const intervalo = setInterval(() => {
                document.getElementById('dado').innerText = carasDado[Math.floor(Math.random() * 6)];
                contador++;
                if (contador > 10) {
                    clearInterval(intervalo);
                    const res = Math.floor(Math.random() * 6) + 1;
                    document.getElementById('dado').innerText = carasDado[res-1];
                    iluminar(res);
                    boton.disabled = false;
                }
            }, 100);
        }

        function iluminar(n) {
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            if (n === 6) document.getElementById('c6').classList.add('iluminado');
            else document.querySelectorAll('.cuadrado')[n-1].classList.add('iluminado');
        }
    </script>
</body>
</html>
