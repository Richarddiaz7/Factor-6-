<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Factor 6 - Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            background: linear-gradient(135deg, #1a0033 0%, #2d004d 30%, #4a0072 70%, #1a0033 100%);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-evenly; 
            min-height: 100vh;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            color: white;
            overflow: hidden;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
        }

        .particulas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particula {
            position: absolute;
            background: gold;
            border-radius: 50%;
            animation: caer linear infinite;
            opacity: 0;
        }

        @keyframes caer {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        #tablero { 
            display: flex; flex-direction: column; align-items: center; gap: 10px; 
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 3px solid #FFD700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
            position: relative;
            z-index: 1;
            width: 95%;
            max-width: 400px;
        }

        .fila-superior { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
            justify-content: center;
        }

        .cuadrado { 
            width: 60px; 
            height: 60px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 1.8em;
            border-radius: 15px; 
            color: white; 
            transition: all 0.3s ease; 
            border: 3px solid rgba(255,255,255,0.3);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        #c6 { 
            width: 180px; 
            height: 70px; 
            background: linear-gradient(135deg, #B8860B, #FFD700);
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 2.2em; 
            color: #000; 
            transition: all 0.3s ease; 
            border: 3px solid #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .c1 { background: linear-gradient(135deg, #FF5733, #C70039); }
        .c2 { background: linear-gradient(135deg, #FFC300, #FF8C00); }
        .c3 { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .c4 { background: linear-gradient(135deg, #2196F3, #1565C0); }
        .c5 { background: linear-gradient(135deg, #9C27B0, #6A1B9A); }

        .slot-machine {
            background: linear-gradient(180deg, #2a0040 0%, #1a0030 50%, #0d0020 100%);
            border: 6px solid #FFD700;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 0 50px rgba(255,215,0,0.5), 0 0 100px rgba(255,215,0,0.3);
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 95%;
            max-width: 400px;
        }

        .slot-ventana {
            background: #000;
            border: 5px solid #B8860B;
            border-radius: 20px;
            padding: 25px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
            width: 180px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slot-ventana::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        .rodillo-unico {
            width: 140px;
            height: 140px;
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .numeros-rodillo {
            position: absolute;
            width: 100%;
            transition: transform 0.1s linear;
        }

        .numero-rodillo {
            width: 100%;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4.5em;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8);
            background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
            border-bottom: 2px solid #333;
        }

        .marcador-central {
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 140px;
            border-top: 4px solid #FFD700;
            border-bottom: 4px solid #FFD700;
            transform: translateY(-50%);
            z-index: 3;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .flechas-indicadoras {
            position: absolute;
            left: -35px; right: -35px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 4;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .flecha-indicadora {
            width: 0; height: 0;
            border-top: 18px solid transparent;
            border-bottom: 18px solid transparent;
        }

        .flecha-izquierda {
            border-right: 22px solid #FFD700;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.8));
        }

        .flecha-derecha {
            border-left: 22px solid #FFD700;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.8));
        }

        .luces-laterales {
            position: absolute;
            top: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            z-index: 4;
        }

        .luces-izquierda { left: -30px; }
        .luces-derecha { right: -30px; }

        .luz {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #FFD700;
            box-shadow: 0 0 20px #FFD700;
            animation: parpadear 0.5s infinite alternate;
        }

        .luz:nth-child(even) { animation-delay: 0.3s; }

        @keyframes parpadear {
            from { opacity: 0.2; box-shadow: 0 0 5px #FFD700; }
            to { opacity: 1; box-shadow: 0 0 25px #FFD700; }
        }

        .btn-lanzar { 
            padding: 18px 50px; 
            font-size: 1.3em; 
            background: linear-gradient(180deg, #FFD700, #B8860B);
            border: 3px solid #FFD700;
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #1a0030; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 25px rgba(255,215,0,0.5);
            width: 100%;
            max-width: 300px;
        }
        
        .btn-lanzar:active { transform: scale(0.95); }
        .btn-lanzar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .iluminado { 
            border-color: #FFD700 !important; 
            transform: scale(1.15); 
            box-shadow: 0 0 30px #FFD700, 0 0 60px rgba(255,215,0,0.5), inset 0 0 30px rgba(255,215,0,0.3) !important; 
            animation: brillo 0.5s ease-in-out infinite alternate;
            z-index: 10;
        }
        
        @keyframes brillo {
            0% { box-shadow: 0 0 20px #FFD700; }
            100% { box-shadow: 0 0 50px #FFD700, 0 0 80px rgba(255,215,0,0.7); }
        }

        .resultado-numero {
            font-size: 2.5em;
            color: #FFD700;
            text-shadow: 0 0 30px #FFD700;
            font-weight: bold;
            animation: aparecer 0.5s ease-out;
            display: none;
        }

        @keyframes aparecer {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes vibracion {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .vibrando { animation: vibracion 0.15s infinite; }
    </style>
</head>
<body>

    <div class="particulas" id="particulas"></div>

    <div id="tablero">
        <div class="fila-superior">
            <div class="cuadrado c1" data-numero="1">1</div>
            <div class="cuadrado c2" data-numero="2">2</div>
            <div class="cuadrado c3" data-numero="3">3</div>
            <div class="cuadrado c4" data-numero="4">4</div>
            <div class="cuadrado c5" data-numero="5">5</div>
        </div>
        <div id="c6" data-numero="6">6</div>
    </div>

    <div class="slot-machine">
        <div class="luces-laterales luces-izquierda">
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
        </div>
        
        <div class="slot-ventana">
            <div class="marcador-central"></div>
            <div class="flechas-indicadoras">
                <div class="flecha-indicadora flecha-izquierda"></div>
                <div class="flecha-indicadora flecha-derecha"></div>
            </div>
            <div class="rodillo-unico" id="rodillo">
                <div class="numeros-rodillo" id="numeros"></div>
            </div>
        </div>
        
        <div class="luces-laterales luces-derecha">
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
        </div>
        
        <div class="resultado-numero" id="resultado"></div>
        
        <button class="btn-lanzar" id="boton">🎰 JACKPOT 🎰</button>
    </div>

    <script>
        // ========================================
        // INICIALIZACIÓN DE TELEGRAM WEB APP
        // ========================================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ========================================
        // CONFIGURACIÓN - NO NECESITAS PONER EL TOKEN AQUÍ
        // El token solo va en el bot de Python
        // ========================================
        
        console.log('✅ Mini App Factor 6 iniciada');
        console.log('👤 Usuario:', tg.initDataUnsafe?.user?.first_name || 'Invitado');

        // Crear partículas
        function crearParticulas() {
            const container = document.getElementById('particulas');
            for (let i = 0; i < 25; i++) {
                const particula = document.createElement('div');
                particula.className = 'particula';
                particula.style.left = Math.random() * 100 + '%';
                particula.style.width = Math.random() * 5 + 2 + 'px';
                particula.style.height = particula.style.width;
                particula.style.animationDuration = Math.random() * 6 + 4 + 's';
                particula.style.animationDelay = Math.random() * 6 + 's';
                container.appendChild(particula);
            }
        }
        crearParticulas();

        // Variables del juego
        let intervaloActual = null;
        let resultadoFinal = 0;
        let jugadasRealizadas = 0;
        const MAX_JUGADAS = 10;

        function inicializarRodillo() {
            const rodillo = document.getElementById('numeros');
            rodillo.innerHTML = '';
            const secuencia = [];
            for (let i = 0; i < 5; i++) {
                for (let j = 1; j <= 6; j++) {
                    secuencia.push(j);
                }
            }
            secuencia.forEach(num => {
                const div = document.createElement('div');
                div.className = 'numero-rodillo';
                div.textContent = num;
                rodillo.appendChild(div);
            });
            rodillo.style.transform = 'translateY(0px)';
        }
        inicializarRodillo();

        function tirarPalanca() {
            const boton = document.getElementById('boton');
            if (boton.disabled) return;
            
            if (jugadasRealizadas >= MAX_JUGADAS) {
                tg.showAlert('🎲 Límite de jugadas alcanzado. ¡Vuelve mañana!');
                return;
            }
            
            boton.disabled = true;
            document.getElementById('resultado').style.display = 'none';
            
            document.querySelectorAll('.cuadrado, #c6').forEach(el => {
                el.classList.remove('iluminado');
            });
            
            resultadoFinal = Math.floor(Math.random() * 6) + 1;
            console.log('🎯 Resultado:', resultadoFinal);
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            
            const slotMachine = document.querySelector('.slot-machine');
            slotMachine.classList.add('vibrando');
            
            if (intervaloActual) clearInterval(intervaloActual);
            inicializarRodillo();
            const rodillo = document.getElementById('numeros');
            
            let posicion = 0;
            let velocidad = 40;
            let framesAvanzados = 0;
            const totalFrames = 180;
            
            intervaloActual = setInterval(() => {
                const desplazamiento = posicion * 140;
                rodillo.style.transform = `translateY(-${desplazamiento}px)`;
                posicion++;
                framesAvanzados++;
                
                if (posicion >= 30) {
                    posicion = 0;
                    inicializarRodillo();
                }
                
                if (framesAvanzados < 100) {
                    velocidad = Math.max(20, velocidad - 1);
                } else if (framesAvanzados < 150) {
                    velocidad += 2;
                } else {
                    velocidad += 5;
                }
                
                if (framesAvanzados >= totalFrames) {
                    clearInterval(intervaloActual);
                    slotMachine.classList.remove('vibrando');
                    setTimeout(() => posicionarNumeroGanador(resultadoFinal), 200);
                }
            }, velocidad);
        }

        function posicionarNumeroGanador(numero) {
            const rodillo = document.getElementById('numeros');
            const desplazamiento = (numero - 1) * 140;
            
            rodillo.style.transition = 'transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
            rodillo.style.transform = `translateY(-${desplazamiento}px)`;
            
            setTimeout(() => {
                iluminarNumero(numero);
                document.getElementById('boton').disabled = false;
                jugadasRealizadas++;
                
                const resultado = document.getElementById('resultado');
                resultado.textContent = `🎉 ${numero} 🎉`;
                resultado.style.display = 'block';
                
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
                
                // Enviar datos al bot
                enviarDatosAlBot(numero);
                
                setTimeout(() => {
                    rodillo.style.transition = 'transform 0.1s linear';
                }, 1000);
                
                crearEfectoCelebracion();
                
                if (jugadasRealizadas >= MAX_JUGADAS - 3) {
                    setTimeout(() => {
                        tg.showPopup({
                            title: '⚠️ Aviso',
                            message: `Te quedan ${MAX_JUGADAS - jugadasRealizadas} jugadas.`,
                            buttons: [{type: 'ok'}]
                        });
                    }, 2000);
                }
            }, 900);
        }

        function enviarDatosAlBot(numero) {
            const data = JSON.stringify({
                action: 'resultado',
                numero: numero,
                jugadas: jugadasRealizadas,
                timestamp: Date.now()
            });
            
            try {
                tg.sendData(data);
                console.log('📤 Datos enviados al bot');
            } catch (error) {
                console.log('ℹ️ Mini App independiente');
            }
        }

        function iluminarNumero(numero) {
            document.querySelectorAll('.cuadrado, #c6').forEach(el => {
                el.classList.remove('iluminado');
            });
            
            setTimeout(() => {
                if (numero === 6) {
                    document.getElementById('c6')?.classList.add('iluminado');
                } else {
                    const cuadrados = document.querySelectorAll('.cuadrado');
                    cuadrados[numero - 1]?.classList.add('iluminado');
                }
            }, 50);
        }

        function crearEfectoCelebracion() {
            const container = document.getElementById('particulas');
            const colores = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'];
            
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const particula = document.createElement('div');
                    particula.className = 'particula';
                    particula.style.left = Math.random() * 100 + '%';
                    particula.style.top = '50%';
                    particula.style.width = Math.random() * 8 + 3 + 'px';
                    particula.style.height = particula.style.width;
                    particula.style.animationDuration = Math.random() * 2 + 2 + 's';
                    particula.style.background = colores[Math.floor(Math.random() * colores.length)];
                    container.appendChild(particula);
                    setTimeout(() => particula.remove(), 3000);
                }, i * 30);
            }
        }

        // Eventos
        document.getElementById('boton').addEventListener('click', (e) => {
            e.preventDefault();
            tirarPalanca();
        });

        document.querySelector('.slot-ventana').addEventListener('click', (e) => {
            e.stopPropagation();
            tirarPalanca();
        });
    </script>
</body>
</html>
