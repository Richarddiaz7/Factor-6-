<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factor 6 - Slot Machine</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #1a0033 0%, #2d004d 30%, #4a0072 70%, #1a0033 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; 
            height: 100vh; font-family: 'Arial', sans-serif; color: white;
            overflow: hidden;
        }

        /* Partículas de fondo */
        .particulas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particula {
            position: absolute;
            background: gold;
            border-radius: 50%;
            animation: caer linear infinite;
            opacity: 0;
        }

        @keyframes caer {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        #tablero { 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
            background: rgba(0,0,0,0.6);
            padding: 25px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 3px solid #FFD700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
            position: relative;
            z-index: 1;
        }

        .fila-superior { 
            display: flex; 
            gap: 15px; 
        }

        .cuadrado { 
            width: 70px; 
            height: 70px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 2em;
            border-radius: 15px; 
            color: white; 
            transition: all 0.3s ease; 
            border: 3px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        #c6 { 
            width: 200px; 
            height: 80px; 
            background: linear-gradient(135deg, #B8860B, #FFD700);
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 2.5em; 
            color: #000; 
            transition: all 0.3s ease; 
            border: 3px solid #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .c1 { background: linear-gradient(135deg, #FF5733, #C70039); }
        .c2 { background: linear-gradient(135deg, #FFC300, #FF8C00); }
        .c3 { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .c4 { background: linear-gradient(135deg, #2196F3, #1565C0); }
        .c5 { background: linear-gradient(135deg, #9C27B0, #6A1B9A); }

        /* Máquina tragamonedas */
        .slot-machine {
            background: linear-gradient(180deg, #2a0040 0%, #1a0030 50%, #0d0020 100%);
            border: 8px solid #FFD700;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 
                0 0 50px rgba(255,215,0,0.5),
                0 0 100px rgba(255,215,0,0.3),
                inset 0 0 30px rgba(255,215,0,0.1);
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .slot-ventana {
            background: #000;
            border: 5px solid #B8860B;
            border-radius: 20px;
            padding: 30px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
            width: 200px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slot-ventana::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        .rodillo-unico {
            width: 150px;
            height: 150px;
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .numeros-rodillo {
            position: absolute;
            width: 100%;
            transition: transform 0.1s linear;
        }

        .numero-rodillo {
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5em;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 
                0 0 20px rgba(255,215,0,0.8),
                0 0 40px rgba(255,215,0,0.4),
                0 0 60px rgba(255,215,0,0.2);
            background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
            border-bottom: 2px solid #333;
        }

        .marcador-central {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 150px;
            border-top: 4px solid #FFD700;
            border-bottom: 4px solid #FFD700;
            transform: translateY(-50%);
            z-index: 3;
            pointer-events: none;
            box-shadow: 
                0 0 20px rgba(255,215,0,0.5),
                inset 0 0 20px rgba(255,215,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flechas-indicadoras {
            position: absolute;
            left: -40px;
            right: -40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 4;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .flecha-indicadora {
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
        }

        .flecha-izquierda {
            border-right: 25px solid #FFD700;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.8));
        }

        .flecha-derecha {
            border-left: 25px solid #FFD700;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.8));
        }

        .luces-laterales {
            position: absolute;
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            z-index: 4;
        }

        .luces-izquierda {
            left: -35px;
        }

        .luces-derecha {
            right: -35px;
        }

        .luz {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #FFD700;
            box-shadow: 0 0 20px #FFD700;
            animation: parpadear 0.5s infinite alternate;
        }

        .luz:nth-child(even) {
            animation-delay: 0.3s;
        }

        @keyframes parpadear {
            from { opacity: 0.2; box-shadow: 0 0 5px #FFD700; }
            to { opacity: 1; box-shadow: 0 0 25px #FFD700, 0 0 40px #FFD700; }
        }

        .btn-lanzar { 
            padding: 20px 60px; 
            font-size: 1.4em; 
            background: linear-gradient(180deg, #FFD700, #B8860B);
            border: 3px solid #FFD700;
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #1a0030; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 
                0 8px 25px rgba(255,215,0,0.5),
                inset 0 -5px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .btn-lanzar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg);
            transition: transform 0.5s;
        }

        .btn-lanzar:hover::before {
            transform: rotate(45deg) translate(100%, 100%);
        }
        
        .btn-lanzar:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(255,215,0,0.8);
        }
        
        .btn-lanzar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translateY(0);
            animation: none;
        }

        .btn-lanzar:disabled::before {
            animation: none;
        }

        .iluminado { 
            border-color: #FFD700 !important; 
            transform: scale(1.15); 
            box-shadow: 
                0 0 30px #FFD700, 
                0 0 60px rgba(255,215,0,0.5), 
                0 0 90px rgba(255,215,0,0.3),
                inset 0 0 30px rgba(255,215,0,0.3) !important; 
            animation: brillo 0.5s ease-in-out infinite alternate;
            z-index: 10;
        }
        
        @keyframes brillo {
            0% { 
                box-shadow: 0 0 20px #FFD700, 0 0 40px rgba(255,215,0,0.5);
                border-width: 3px;
            }
            100% { 
                box-shadow: 0 0 50px #FFD700, 0 0 80px rgba(255,215,0,0.7), 0 0 120px rgba(255,215,0,0.5);
                border-width: 5px;
            }
        }

        .resultado-numero {
            font-size: 3em;
            color: #FFD700;
            text-shadow: 0 0 30px #FFD700;
            font-weight: bold;
            animation: aparecer 0.5s ease-out;
            display: none;
        }

        @keyframes aparecer {
            from {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes vibracion {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
            20%, 40%, 60%, 80% { transform: translateX(3px); }
        }

        .vibrando {
            animation: vibracion 0.15s infinite;
        }
    </style>
</head>
<body>

    <!-- Partículas de fondo -->
    <div class="particulas" id="particulas"></div>

    <div id="tablero">
        <div class="fila-superior">
            <div class="cuadrado c1">1</div>
            <div class="cuadrado c2">2</div>
            <div class="cuadrado c3">3</div>
            <div class="cuadrado c4">4</div>
            <div class="cuadrado c5">5</div>
        </div>
        <div id="c6">6</div>
    </div>

    <div class="slot-machine">
        <div class="luces-laterales luces-izquierda">
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
            <div class="luz"></div><div class="luz"></div>
        </div>
        
        <div class="slot-ventana">
            <div class="marcador-central"></div>
            <div class="flechas-indicadoras">
                <div class="flecha-indicadora flecha-izquierda"></div>
                <div class="flecha-indicadora flecha-derecha"></div>
            </div>
            <div class="rodillo-unico" id="rodillo">
                <div class="numeros-rodillo" id="numeros"></div>
            </div>
        </div>
        
        <div class="luces-laterales luces-derecha">
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
            <div class="luz"></div><div class="luz"></div>
        </div>
        
        <div class="resultado-numero" id="resultado"></div>
        
        <button class="btn-lanzar" id="boton" onclick="tirarPalanca()">🎰 JACKPOT 🎰</button>
    </div>

    <script>
        // Crear partículas de fondo
        function crearParticulas() {
            const container = document.getElementById('particulas');
            for (let i = 0; i < 25; i++) {
                const particula = document.createElement('div');
                particula.className = 'particula';
                particula.style.left = Math.random() * 100 + '%';
                particula.style.width = Math.random() * 5 + 2 + 'px';
                particula.style.height = particula.style.width;
                particula.style.animationDuration = Math.random() * 6 + 4 + 's';
                particula.style.animationDelay = Math.random() * 6 + 's';
                container.appendChild(particula);
            }
        }
        crearParticulas();

        // Inicializar rodillo
        let intervaloActual = null;
        let resultadoFinal = 0;

        function inicializarRodillo() {
            const rodillo = document.getElementById('numeros');
            rodillo.innerHTML = '';
            
            // Crear secuencia de números (múltiples vueltas para animación fluida)
            const secuencia = [];
            for (let i = 0; i < 30; i++) {
                secuencia.push(Math.floor(Math.random() * 6) + 1);
            }
            
            secuencia.forEach(num => {
                const div = document.createElement('div');
                div.className = 'numero-rodillo';
                div.textContent = num;
                rodillo.appendChild(div);
            });
            
            // Posicionar en la primera posición
            rodillo.style.transform = 'translateY(0px)';
        }
        inicializarRodillo();

        function tirarPalanca() {
            const boton = document.getElementById('boton');
            if (boton.disabled) return;
            
            boton.disabled = true;
            document.getElementById('resultado').style.display = 'none';
            
            // Limpiar iluminaciones
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            
            // Elegir número ganador aleatorio
            resultadoFinal = Math.floor(Math.random() * 6) + 1;
            console.log('🎯 Resultado:', resultadoFinal);
            
            // Agregar efecto de vibración
            const slotMachine = document.querySelector('.slot-machine');
            slotMachine.classList.add('vibrando');
            
            // Detener intervalo anterior
            if (intervaloActual) clearInterval(intervaloActual);
            
            // Inicializar nuevo rodillo
            inicializarRodillo();
            const rodillo = document.getElementById('numeros');
            
            let posicion = 0;
            let velocidad = 30; // Velocidad inicial rápida
            let vueltasCompletas = 0;
            const vueltasNecesarias = 8;
            
            intervaloActual = setInterval(() => {
                // Mover el rodillo hacia arriba
                const desplazamiento = posicion * 150; // 150px por número
                rodillo.style.transform = `translateY(-${desplazamiento}px)`;
                
                posicion++;
                
                // Si llegamos al final de la secuencia, reiniciamos
                if (posicion >= 30) {
                    posicion = 0;
                    vueltasCompletas++;
                    inicializarRodillo();
                    
                    // Reducir velocidad gradualmente
                    if (vueltasCompletas >= vueltasNecesarias - 2) {
                        velocidad += 20; // Más lento
                    }
                }
                
                // Detener cuando haya dado suficientes vueltas
                if (vueltasCompletas >= vueltasNecesarias) {
                    clearInterval(intervaloActual);
                    
                    // Quitar vibración
                    slotMachine.classList.remove('vibrando');
                    
                    // Posicionar en el número ganador con animación de rebote
                    setTimeout(() => {
                        posicionarNumeroGanador(resultadoFinal);
                    }, 200);
                }
            }, velocidad);
        }

        function posicionarNumeroGanador(numero) {
            const rodillo = document.getElementById('numeros');
            
            // Calcular desplazamiento para mostrar el número ganador en el centro
            const desplazamiento = (numero - 1) * 150;
            
            // Animación de rebote
            rodillo.style.transition = 'transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
            rodillo.style.transform = `translateY(-${desplazamiento}px)`;
            
            // Mostrar resultado y iluminar
            setTimeout(() => {
                iluminar(resultadoFinal);
                document.getElementById('boton').disabled = false;
                
                // Mostrar número ganador
                const resultado = document.getElementById('resultado');
                resultado.textContent = `🎉 ${resultadoFinal} 🎉`;
                resultado.style.display = 'block';
                
                // Restaurar transición normal
                setTimeout(() => {
                    rodillo.style.transition = 'transform 0.1s linear';
                }, 1000);
                
                // Efecto de celebración
                crearEfectoCelebracion();
            }, 900);
        }

        function iluminar(n) {
            document.querySelectorAll('.cuadrado, #c6').forEach(el => {
                el.classList.remove('iluminado');
                el.style.animation = 'none';
                // Forzar reflow
                el.offsetHeight;
                el.style.animation = '';
            });
            
            setTimeout(() => {
                if (n === 6) {
                    document.getElementById('c6').classList.add('iluminado');
                } else {
                    const cuadrados = document.querySelectorAll('.cuadrado');
                    if (cuadrados[n - 1]) {
                        cuadrados[n - 1].classList.add('iluminado');
                    }
                }
            }, 100);
        }

        function crearEfectoCelebracion() {
            const container = document.getElementById('particulas');
            const colores = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'];
            
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const particula = document.createElement('div');
                    particula.className = 'particula';
                    particula.style.left = Math.random() * 100 + '%';
                    particula.style.top = '50%';
                    particula.style.width = Math.random() * 8 + 3 + 'px';
                    particula.style.height = particula.style.width;
                    particula.style.animationDuration = Math.random() * 2 + 2 + 's';
                    particula.style.background = colores[Math.floor(Math.random() * colores.length)];
                    particula.style.boxShadow = `0 0 10px ${particula.style.background}`;
                    container.appendChild(particula);
                    
                    setTimeout(() => {
                        particula.remove();
                    }, 3000);
                }, i * 30);
            }
        }

        // Permitir tirar con la tecla espacio
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                tirarPalanca();
            }
        });
    </script>
</body>
</html>
