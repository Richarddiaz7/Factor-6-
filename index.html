<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factor 6 - Ruleta Arreglada</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(to bottom, #87CEEB 0%, #000080 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; 
            height: 100vh; font-family: sans-serif; color: white;
        }

        #tablero { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .fila-superior { display: flex; gap: 10px; }
        .cuadrado { 
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; 
            font-weight: bold; border-radius: 8px; color: black; transition: 0.3s; 
            border: 4px solid transparent; 
        }
        #c6 { 
            width: 150px; height: 60px; background: #FFD700; 
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 1.5em; color: black; transition: 0.3s; 
            border: 4px solid transparent; 
        }

        .c1 { background-color: #FF5733; } 
        .c2 { background-color: #FFC300; } 
        .c3 { background-color: #DAF7A6; } 
        .c4 { background-color: #33FFBD; } 
        .c5 { background-color: #3380FF; }

        #ruleta-container { 
            position: relative; 
            width: 250px; 
            height: 250px; 
        }
        
        #flecha { 
            position: absolute; 
            top: -30px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent; 
            border-right: 20px solid transparent; 
            border-top: 35px solid #FFD700; 
            z-index: 10; 
        }
        
        #ruleta { 
            width: 250px; 
            height: 250px; 
            border-radius: 50%; 
            border: 8px solid white;
            position: relative;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1);
            overflow: hidden;
        }

        /* Segmentos de colores */
        .segmento {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            left: 0;
            top: 0;
        }

        .seg-1 { background: #FF5733; transform: rotate(0deg); }
        .seg-2 { background: #FFC300; transform: rotate(60deg); }
        .seg-3 { background: #DAF7A6; transform: rotate(120deg); }
        .seg-4 { background: #33FFBD; transform: rotate(180deg); }
        .seg-5 { background: #3380FF; transform: rotate(240deg); }
        .seg-6 { background: #FFD700; transform: rotate(300deg); }

        /* Contenedor de número */
        .numero-container {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            transform-origin: 100% 100%;
        }

        .numero-txt { 
            position: absolute;
            left: 65%;
            top: 15%;
            font-weight: 900; 
            color: #000; 
            font-size: 2em;
            transform: translate(-50%, -50%);
        }

        .btn-lanzar { 
            padding: 15px 40px; 
            font-size: 1.2em; 
            background: #fff; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #000080; 
            transition: 0.3s;
        }
        
        .btn-lanzar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px white;
        }
        
        .btn-lanzar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }
        
        .iluminado { 
            border-color: white !important; 
            transform: scale(1.15); 
            box-shadow: 0 0 25px white, 0 0 50px rgba(255,255,255,0.5); 
            animation: brillo 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes brillo {
            from { box-shadow: 0 0 15px white; }
            to { box-shadow: 0 0 35px white, 0 0 60px rgba(255,255,255,0.7); }
        }
    </style>
</head>
<body>

    <div id="tablero">
        <div class="fila-superior">
            <div class="cuadrado c1">1</div>
            <div class="cuadrado c2">2</div>
            <div class="cuadrado c3">3</div>
            <div class="cuadrado c4">4</div>
            <div class="cuadrado c5">5</div>
        </div>
        <div id="c6">6</div>
    </div>

    <div id="ruleta-container">
        <div id="flecha"></div>
        <div id="ruleta">
            <!-- Segmento 1 -->
            <div class="segmento seg-1"></div>
            <div class="numero-container" style="transform: rotate(30deg);">
                <span class="numero-txt">1</span>
            </div>
            <!-- Segmento 2 -->
            <div class="segmento seg-2"></div>
            <div class="numero-container" style="transform: rotate(90deg);">
                <span class="numero-txt">2</span>
            </div>
            <!-- Segmento 3 -->
            <div class="segmento seg-3"></div>
            <div class="numero-container" style="transform: rotate(150deg);">
                <span class="numero-txt">3</span>
            </div>
            <!-- Segmento 4 -->
            <div class="segmento seg-4"></div>
            <div class="numero-container" style="transform: rotate(210deg);">
                <span class="numero-txt">4</span>
            </div>
            <!-- Segmento 5 -->
            <div class="segmento seg-5"></div>
            <div class="numero-container" style="transform: rotate(270deg);">
                <span class="numero-txt">5</span>
            </div>
            <!-- Segmento 6 -->
            <div class="segmento seg-6"></div>
            <div class="numero-container" style="transform: rotate(330deg);">
                <span class="numero-txt">6</span>
            </div>
        </div>
    </div>

    <button class="btn-lanzar" id="boton" onclick="girarRuleta()">🎯 GIRAR 🎯</button>

    <script>
        const ruleta = document.getElementById('ruleta');
        let gradosActuales = 0;
        let girando = false;

        function girarRuleta() {
            if (girando) return;
            
            const boton = document.getElementById('boton');
            boton.disabled = true;
            girando = true;
            
            // Limpiar iluminaciones anteriores
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            
            // Elegir un número aleatorio del 1 al 6
            const numeroGanador = Math.floor(Math.random() * 6) + 1;
            console.log('Número ganador:', numeroGanador);
            
            // Calcular el ángulo para que el número quede bajo la flecha (arriba)
            // La flecha está en la parte superior (12 en punto)
            // Los segmentos empiezan en 0° (derecha, 3 en punto) y van en sentido horario
            
            // Posiciones de los centros de los segmentos en grados (donde están los números)
            // Segmento 1: 30°, Segmento 2: 90°, Segmento 3: 150°, 
            // Segmento 4: 210°, Segmento 5: 270°, Segmento 6: 330°
            
            const angulosNumeros = [30, 90, 150, 210, 270, 330]; // grados donde está cada número
            const anguloDeseado = angulosNumeros[numeroGanador - 1];
            
            // Para que el número quede bajo la flecha (270° o -90°), necesitamos calcular la rotación
            // Si el número está en anguloDeseado, y queremos que esté en 270° (arriba de la ruleta),
            // necesitamos rotar: 270° - anguloDeseado
            
            let rotacionNecesaria = 270 - anguloDeseado;
            
            // Ajustar para que siempre gire en la misma dirección y dé varias vueltas
            let rotacionTotal = gradosActuales + 1440 + rotacionNecesaria; // 4 vueltas completas
            
            // Asegurar que siempre gire hacia adelante
            while (rotacionTotal <= gradosActuales) {
                rotacionTotal += 360;
            }
            
            ruleta.style.transform = `rotate(${rotacionTotal}deg)`;
            gradosActuales = rotacionTotal;
            
            // Iluminar después de que termine el giro
            setTimeout(() => {
                iluminar(numeroGanador);
                boton.disabled = false;
                girando = false;
            }, 4100);
        }

        function iluminar(n) {
            console.log('Iluminando número:', n);
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            
            if (n === 6) {
                document.getElementById('c6').classList.add('iluminado');
            } else {
                const cuadrados = document.querySelectorAll('.cuadrado');
                cuadrados[n - 1].classList.add('iluminado');
            }
        }
    </script>
</body>
</html>
