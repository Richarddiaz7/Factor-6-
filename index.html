<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factor 6 - Slot Machine</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #1a0033 0%, #2d004d 30%, #4a0072 70%, #1a0033 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; 
            height: 100vh; font-family: 'Arial', sans-serif; color: white;
            overflow: hidden;
        }

        /* Partículas de fondo */
        .particulas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particula {
            position: absolute;
            background: gold;
            border-radius: 50%;
            animation: caer linear infinite;
            opacity: 0;
        }

        @keyframes caer {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        #tablero { 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
            background: rgba(0,0,0,0.6);
            padding: 25px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 3px solid #FFD700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
            position: relative;
            z-index: 1;
        }

        .titulo-tablero {
            font-size: 1.2em;
            color: #FFD700;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .fila-superior { 
            display: flex; 
            gap: 15px; 
        }

        .cuadrado { 
            width: 70px; 
            height: 70px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 2em;
            border-radius: 15px; 
            color: white; 
            transition: all 0.3s ease; 
            border: 3px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        #c6 { 
            width: 200px; 
            height: 80px; 
            background: linear-gradient(135deg, #B8860B, #FFD700);
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 2.5em; 
            color: #000; 
            transition: all 0.3s ease; 
            border: 3px solid #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .c1 { background: linear-gradient(135deg, #FF5733, #C70039); }
        .c2 { background: linear-gradient(135deg, #FFC300, #FF8C00); }
        .c3 { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .c4 { background: linear-gradient(135deg, #2196F3, #1565C0); }
        .c5 { background: linear-gradient(135deg, #9C27B0, #6A1B9A); }

        /* Máquina tragamonedas */
        .slot-machine {
            background: linear-gradient(180deg, #2a0040 0%, #1a0030 50%, #0d0020 100%);
            border: 8px solid #FFD700;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 
                0 0 50px rgba(255,215,0,0.5),
                0 0 100px rgba(255,215,0,0.3),
                inset 0 0 30px rgba(255,215,0,0.1);
            position: relative;
            z-index: 1;
        }

        .slot-ventana {
            background: #000;
            border: 5px solid #B8860B;
            border-radius: 20px;
            padding: 20px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
        }

        .slot-ventana::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        .rodillos-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .rodillo {
            width: 100px;
            height: 120px;
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .numeros-rodillo {
            position: absolute;
            width: 100%;
            transition: transform 0.1s linear;
        }

        .numero-rodillo {
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5em;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
            border-bottom: 2px solid #333;
        }

        .marcador-central {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 120px;
            border-top: 4px solid #FFD700;
            border-bottom: 4px solid #FFD700;
            transform: translateY(-50%);
            z-index: 3;
            pointer-events: none;
            box-shadow: 
                0 0 20px rgba(255,215,0,0.5),
                inset 0 0 20px rgba(255,215,0,0.2);
        }

        .luces-laterales {
            position: absolute;
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            z-index: 4;
        }

        .luces-izquierda {
            left: -30px;
        }

        .luces-derecha {
            right: -30px;
        }

        .luz {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #FFD700;
            box-shadow: 0 0 15px #FFD700;
            animation: parpadear 0.5s infinite alternate;
        }

        .luz:nth-child(even) {
            animation-delay: 0.3s;
        }

        @keyframes parpadear {
            from { opacity: 0.3; box-shadow: 0 0 5px #FFD700; }
            to { opacity: 1; box-shadow: 0 0 20px #FFD700, 0 0 30px #FFD700; }
        }

        .palanca-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-lanzar { 
            padding: 18px 50px; 
            font-size: 1.3em; 
            background: linear-gradient(180deg, #FFD700, #B8860B);
            border: 3px solid #FFD700;
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #1a0030; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 
                0 5px 20px rgba(255,215,0,0.5),
                inset 0 -5px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .btn-lanzar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: transform 0.5s;
        }

        .btn-lanzar:hover::before {
            transform: rotate(45deg) translate(100%, 100%);
        }
        
        .btn-lanzar:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255,215,0,0.8);
        }
        
        .btn-lanzar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translateY(0);
            animation: none;
        }

        .iluminado { 
            border-color: #FFD700 !important; 
            transform: scale(1.15); 
            box-shadow: 
                0 0 30px #FFD700, 
                0 0 60px rgba(255,215,0,0.5), 
                0 0 90px rgba(255,215,0,0.3),
                inset 0 0 30px rgba(255,215,0,0.3) !important; 
            animation: brillo 0.5s ease-in-out infinite alternate;
            z-index: 10;
        }
        
        @keyframes brillo {
            0% { 
                box-shadow: 0 0 20px #FFD700, 0 0 40px rgba(255,215,0,0.5);
            }
            100% { 
                box-shadow: 0 0 50px #FFD700, 0 0 80px rgba(255,215,0,0.7), 0 0 120px rgba(255,215,0,0.5);
            }
        }

        .mensaje-ganador {
            font-size: 2em;
            color: #FFD700;
            text-shadow: 0 0 20px #FFD700;
            font-weight: bold;
            display: none;
            animation: aparecer 0.5s ease-out;
        }

        @keyframes aparecer {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <!-- Partículas de fondo -->
    <div class="particulas" id="particulas"></div>

    <div id="tablero">
        <div class="titulo-tablero">🎯 Números Ganadores</div>
        <div class="fila-superior">
            <div class="cuadrado c1">1</div>
            <div class="cuadrado c2">2</div>
            <div class="cuadrado c3">3</div>
            <div class="cuadrado c4">4</div>
            <div class="cuadrado c5">5</div>
        </div>
        <div id="c6">6</div>
    </div>

    <div class="slot-machine">
        <div class="luces-laterales luces-izquierda">
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
        </div>
        
        <div class="slot-ventana">
            <div class="marcador-central"></div>
            <div class="rodillos-container">
                <div class="rodillo" id="rodillo1">
                    <div class="numeros-rodillo" id="numeros1"></div>
                </div>
                <div class="rodillo" id="rodillo2">
                    <div class="numeros-rodillo" id="numeros2"></div>
                </div>
                <div class="rodillo" id="rodillo3">
                    <div class="numeros-rodillo" id="numeros3"></div>
                </div>
            </div>
        </div>
        
        <div class="luces-laterales luces-derecha">
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
            <div class="luz"></div><div class="luz"></div><div class="luz"></div>
        </div>
        
        <div class="palanca-container">
            <button class="btn-lanzar" id="boton" onclick="tirarPalanca()">🎰 ¡TIRAR! 🎰</button>
        </div>
    </div>

    <div class="mensaje-ganador" id="mensaje"></div>

    <script>
        // Crear partículas de fondo
        function crearParticulas() {
            const container = document.getElementById('particulas');
            for (let i = 0; i < 20; i++) {
                const particula = document.createElement('div');
                particula.className = 'particula';
                particula.style.left = Math.random() * 100 + '%';
                particula.style.width = Math.random() * 5 + 2 + 'px';
                particula.style.height = particula.style.width;
                particula.style.animationDuration = Math.random() * 5 + 5 + 's';
                particula.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particula);
            }
        }
        crearParticulas();

        // Inicializar rodillos
        const rodillos = ['numeros1', 'numeros2', 'numeros3'];
        let intervalos = [];
        let resultadoFinal = 0;

        function inicializarRodillo(id) {
            const rodillo = document.getElementById(id);
            rodillo.innerHTML = '';
            
            // Crear secuencia de números (múltiples vueltas para animación fluida)
            const secuencia = [];
            for (let i = 0; i < 20; i++) {
                secuencia.push(Math.floor(Math.random() * 6) + 1);
            }
            
            secuencia.forEach(num => {
                const div = document.createElement('div');
                div.className = 'numero-rodillo';
                div.textContent = num;
                rodillo.appendChild(div);
            });
            
            return secuencia;
        }

        function inicializarTodos() {
            rodillos.forEach(id => inicializarRodillo(id));
        }
        inicializarTodos();

        function tirarPalanca() {
            const boton = document.getElementById('boton');
            if (boton.disabled) return;
            
            boton.disabled = true;
            document.getElementById('mensaje').style.display = 'none';
            
            // Limpiar iluminaciones
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            
            // Elegir número ganador aleatorio
            resultadoFinal = Math.floor(Math.random() * 6) + 1;
            console.log('Resultado:', resultadoFinal);
            
            // Detener intervalos anteriores
            intervalos.forEach(clearInterval);
            intervalos = [];
            
            // Velocidades diferentes para cada rodillo
            const velocidades = [30, 40, 50]; // ms entre cambios
            
            // Iniciar giro de cada rodillo
            rodillos.forEach((id, index) => {
                const rodillo = document.getElementById(id);
                const secuencia = inicializarRodillo(id);
                let posicion = 0;
                let contadorVueltas = 0;
                const vueltasNecesarias = 5 + index; // Cada rodillo da más vueltas
                
                const intervalo = setInterval(() => {
                    // Mover el rodillo hacia arriba
                    const desplazamiento = posicion * 120; // 120px por número
                    rodillo.style.transform = `translateY(-${desplazamiento}px)`;
                    
                    posicion++;
                    
                    // Si llegamos al final, reiniciamos
                    if (posicion >= secuencia.length) {
                        posicion = 0;
                        contadorVueltas++;
                        inicializarRodillo(id);
                    }
                    
                    // Detener el rodillo cuando haya dado suficientes vueltas
                    if (contadorVueltas >= vueltasNecesarias && index === rodillos.length - 1) {
                        clearInterval(intervalo);
                        finalizarGiro();
                    } else if (contadorVueltas >= vueltasNecesarias) {
                        clearInterval(intervalo);
                        // Posicionar en el número correcto
                        setTimeout(() => {
                            posicionarRodillo(rodillo, resultadoFinal);
                        }, 100 * index);
                    }
                }, velocidades[index]);
                
                intervalos.push(intervalo);
            });
        }

        function posicionarRodillo(rodillo, numero) {
            // Mover al número correcto
            const desplazamiento = (numero - 1) * 120;
            rodillo.style.transition = 'transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
            rodillo.style.transform = `translateY(-${desplazamiento}px)`;
        }

        function finalizarGiro() {
            // Posicionar todos los rodillos en el número ganador
            rodillos.forEach((id, index) => {
                const rodillo = document.getElementById(id);
                setTimeout(() => {
                    posicionarRodillo(rodillo, resultadoFinal);
                }, 200 * index);
            });
            
            // Iluminar el número ganador
            setTimeout(() => {
                iluminar(resultadoFinal);
                document.getElementById('boton').disabled = false;
                
                // Mostrar mensaje de ganador
                const mensaje = document.getElementById('mensaje');
                mensaje.textContent = `¡Número ${resultadoFinal}! 🎉`;
                mensaje.style.display = 'block';
                
                // Efecto de celebración
                crearEfectoCelebracion();
            }, 1500);
        }

        function iluminar(n) {
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            
            if (n === 6) {
                document.getElementById('c6').classList.add('iluminado');
            } else {
                const cuadrados = document.querySelectorAll('.cuadrado');
                if (cuadrados[n - 1]) {
                    cuadrados[n - 1].classList.add('iluminado');
                }
            }
        }

        function crearEfectoCelebracion() {
            const container = document.getElementById('particulas');
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const particula = document.createElement('div');
                    particula.className = 'particula';
                    particula.style.left = Math.random() * 100 + '%';
                    particula.style.top = '50%';
                    particula.style.width = Math.random() * 8 + 3 + 'px';
                    particula.style.height = particula.style.width;
                    particula.style.animationDuration = Math.random() * 2 + 2 + 's';
                    particula.style.background = `hsl(${Math.random() * 60 + 30}, 100%, 50%)`;
                    container.appendChild(particula);
                    
                    setTimeout(() => {
                        particula.remove();
                    }, 3000);
                }, i * 50);
            }
        }

        // Permitir tirar con la tecla espacio
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                tirarPalanca();
            }
        });
    </script>
</body>
</html>
