<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factor 6 - Versión Profesional</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(180deg, #001f3f 0%, #000000 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            height: 100vh; font-family: sans-serif; color: white; padding: 20px;
        }

        .bandera { position: absolute; top: 15px; width: 50px; height: 30px; background: linear-gradient(to bottom, #ffcc00 33.3%, #003399 33.3% 66.6%, #cf142b 66.6%); opacity: 0.7; border-radius: 3px; }
        .bandera-izq { left: 15px; } .bandera-der { right: 15px; }

        #tablero { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 50px; }
        .fila-superior { display: flex; gap: 10px; }
        .cuadrado { width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 8px; color: black; transition: 0.3s; border: 4px solid transparent; }
        #c6 { width: 160px; height: 80px; background: #FFD700; clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.8em; color: black; margin-top: 10px; border: 4px solid transparent; transition: 0.3s; }

        .c1 { background-color: #FF5733; } .c2 { background-color: #FFC300; } .c3 { background-color: #DAF7A6; } .c4 { background-color: #33FFBD; } .c5 { background-color: #3380FF; }

        /* Contenedor del dado */
        #dado-container { width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; margin-top: 20px; }
        #dado-img { width: 100%; height: 100%; object-fit: contain; }

        .btn-lanzar { padding: 20px 50px; font-size: 1.5em; background: #FFD700; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; color: black; box-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-bottom: 40px; }
        .iluminado { border-color: white !important; transform: scale(1.05); box-shadow: 0 0 20px white; }
    </style>
</head>
<body>
    <div class="bandera bandera-izq"></div>
    <div class="bandera bandera-der"></div>

    <div id="tablero">
        <div class="fila-superior">
            <div class="cuadrado c1">1</div>
            <div class="cuadrado c2">2</div>
            <div class="cuadrado c3">3</div>
            <div class="cuadrado c4">4</div>
            <div class="cuadrado c5">5</div>
        </div>
        <div id="c6">6</div>
    </div>

    <div id="dado-container">
        <img id="dado-img" src="[attachment_0](attachment)" alt="Dado">
    </div>

    <button class="btn-lanzar" id="boton" onclick="lanzar()">LANZAR</button>

    <script>
        const boton = document.getElementById('boton');
        const dadoImg = document.getElementById('dado-img');

        function lanzar() {
            boton.disabled = true;
            // Simulamos el rodado cambiando una clase o efecto
            let cuenta = 0;
            const intervalo = setInterval(() => {
                cuenta++;
                dadoImg.style.opacity = (cuenta % 2 === 0) ? "0.5" : "1";
                if(cuenta > 10) {
                    clearInterval(intervalo);
                    dadoImg.style.opacity = "1";
                    const res = Math.floor(Math.random() * 6) + 1;
                    iluminar(res);
                    boton.disabled = false;
                }
            }, 100);
        }

        function iluminar(n) {
            document.querySelectorAll('.cuadrado, #c6').forEach(el => el.classList.remove('iluminado'));
            if (n === 6) document.getElementById('c6').classList.add('iluminado');
            else document.querySelectorAll('.cuadrado')[n-1].classList.add('iluminado');
        }
    </script>
</body>
</html>
